bot:
  # Owner ID of your account (can't be same as bot's ID)
  owner_id: 272402839874174976
  
  # Prefix you want bot commands to be triggered with
  prefix: ","
  
  # The word(s) you want the AI to respond to
  trigger: "John, Jon"

  # Models to use from Groq (will fallback to next on rate limit)
  groq_models:
    - "llama-3.3-70b-versatile" 
    - "meta-llama/llama-4-scout-17b-16e-instruct"
    - "openai/gpt-oss-20b"

  # Model used for image description (must support vision)
  # If not set or model not found, falls back to primary groq model
  
  # Model used for image description (must support vision)
  groq_image_model: "meta-llama/llama-4-scout-17b-16e-instruct"

  # Model used for voice transcription
  groq_whisper_model: "whisper-large-v3-turbo"
  # TTS voice settings
  tts:
    enabled: true
    voice: "diana"        # autumn / diana / hannah / austin / daniel / troy
    tones:
      - "[casual]"
      - "[warm]"
      
  # Whether the bot should respond to DM's from people
  allow_dm: true

  # Whether the bot should be active in group chats
  allow_gc: true

  # Realistic Typing
  realistic_typing: true

  # Whether to wait and collect multiple messages before responding
  batch_messages: true 

  # Time before responding
  batch_wait_times:
    - time: 9       # quick reply, saw it immediately
      weight: 65
    - time: 20      # normal reply, took a few seconds to think
      weight: 20
    - time: 90      # slightly distracted
      weight: 10
    - time: 600     # 10 mins, actually busy
      weight: 4
    - time: 1600    # less than 30 mins, genuinely away
      weight: 1

  # Anti-detection settings
  ignore_chance: 0.03       # Chance to ignore a message
  typo_chance: 0.05         # Chance of a typo per message

  # Priority prefix to bypass batch wait times
  priority_prefix: "="

  # Whether the bot should keep replying to people, even if there's no trigger
  hold_conversation: true
  
  # Anti Age Ban Measures
  anti_age_ban: false

  # Disable the bot from being able to mention anyone
  disable_mentions: false

  # Whether the bot should ping on replies
  reply_ping: true

  # --- Mood system ---
  mood:
    enabled: true
    shift_interval_min: 1800   # 30 minutes
    shift_interval_max: 3600   # 60 minutes
    moods:
      chill: "Be relaxed and unbothered. Keep replies easy-going, don't overthink."
      playful: "Be playful and energetic. Tease more, be funnier than usual."
      busy: "You're distracted. Keep replies short, slightly impatient."
      tired: "You're tired. Low energy, shorter replies, less enthusiasm."
      annoyed: "You're mildly annoyed. Be blunt and less patient, but not rude."
      flirty: "Be flirty and a bit more suggestive than usual."
      
  # --- Random status loop ---
  status:
    enabled: true
    change_interval_min: 1800
    change_interval_max: 10800
    statuses:
      - online
      - idle
      - dnd

  # --- Late reply openers ---
  late_reply:
    enabled: true
    threshold: 300   # 5 minutes
    openers_en:
      - "sorry was watching tiktok lol "
      - "omg sorry just saw this "
      - "sorry was busy haha "
      - "oh sorry didn't see this "
      - "lol sorry took a while "
      - "sorry was distracted "
      - "oh wait i just saw this lol "
    openers_fr:
      - "déso je viens de voir lol "
      - "pardon j'étais occupée haha "
      - "mdrr déso je t'avais pas vu "
      - "oh pardon je regardais tiktok "
      - "déso j'ai mis du temps "
    french_indicators:
      - "bonjour"
      - "salut"
      - "coucou"
      - "quoi"
      - "tu"
      - "vous"
      - "je"
      - "moi"
      - "ouais"
      - "non"
      - "oui"
      - "bah"
      - "wesh"
      - "mdrr"
      - "ptdr"


  # --- Friend request auto-accept ---
  friend_requests:
    enabled: true
    accept_delay: 300  # 5 minutes

    # Delay in seconds before accepting (0 = instant)
    accept_delay: 600   # 10 minutes
notifications:
  error_webhook: "" 
  ratelimit_notifications: true
