bot:
  # Owner ID of your account (can't be same as bot's ID)
  owner_id: 272402839874174976
  
  # Prefix you want bot commands to be triggered with
  prefix: ","
  
  # The word(s) you want the AI to respond to
  trigger: "Alicia, Aliciaa, Ali"

  # Model of the AI you'd like to use from Groq
  # Models to use from Groq (will fallback to next on rate limit)
  groq_models:
    - "meta-llama/llama-4-scout-17b-16e-instruct"
    - "llama-3.3-70b-versatile"
    - "openai/gpt-oss-120b"

  # Whether the bot should respond to DM's from people
  allow_dm: true

  # Whether the bot should be active in group chats
  allow_gc: true

  # Realistic Typing
  realistic_typing: true

  # Whether to wait and collect multiple messages before responding
  batch_messages: true 

  # Time before responding
  batch_wait_times:
    - time: 9       # quick reply, saw it immediately
      weight: 65
    - time: 20      # normal reply, took a few seconds to think
      weight: 20
    - time: 90      # slightly distracted
      weight: 10
    - time: 600     # 10 mins, actually busy
      weight: 4
    - time: 1600    # less than 30 mins, genuinely away
      weight: 1

  # Anti-detection settings
  ignore_chance: 0.03       # Chance to ignore a message
  typo_chance: 0.05         # Chance of a typo per message

  # Priority prefix to bypass batch wait times
  priority_prefix: "="

  # Whether the bot should keep replying to people, even if there's no trigger
  hold_conversation: true
  
  # Anti Age Ban Measures
  anti_age_ban: false

  # Whether the help command should be usable by everyone or just the owner
  help_command_enabled: false

  # Disable the bot from being able to mention anyone
  disable_mentions: false

  # Whether the bot should ping on replies
  reply_ping: true

  # --- Mood system ---
  mood:
    # Enable or disable the mood system entirely
    enabled: true

    # How often mood shifts (in seconds). Random between min and max.
    shift_interval_min: 1800   # 30 minutes
    shift_interval_max: 3600   # 60 minutes

    # Available moods and the prompt injected into instructions for each
    moods:
      chill: "You are in a relaxed, calm mood. Replies are easy-going and unbothered."
      playful: "You are in a playful, energetic mood. More teasing and fun than usual."
      busy: "You are a bit busy or distracted. Replies are shorter and slightly impatient."
      tired: "You are tired. Replies are slower, shorter, a bit low energy."
      annoyed: "You are mildly annoyed. Not rude, but less patient and more blunt."
      flirty: "You are in a flirty mood. More suggestive and playful than usual."

  # --- Random status loop ---
  status:
    # Enable or disable the random status loop
    enabled: true

    # How often status changes (in seconds). Random between min and max.
    change_interval_min: 1800    # 30 minutes
    change_interval_max: 10800   # 3 hours

    # Statuses to cycle through: online, idle, dnd, invisible
    statuses:
      - online
      - idle
      - dnd

  # --- Late reply openers ---
  late_reply:
    # Enable or disable late reply openers
    enabled: true

    # How long a wait (in seconds) before a late opener is used
    threshold: 300   # 5 minutes

    # Openers in English
    openers_en:
      - "sorry was watching tiktok lol "
      - "omg sorry just saw this "
      - "sorry was busy haha "
      - "oh sorry didn't see this "
      - "lol sorry took a while "
      - "sorry was distracted "
      - "oh wait i just saw this lol "

    # Openers in French
    openers_fr:
      - "déso je viens de voir lol "
      - "pardon j'étais occupée haha "
      - "mdrr déso je t'avais pas vu "
      - "oh pardon je regardais tiktok "
      - "déso j'ai mis du temps "

    # Words used to detect if a message is in French
    french_indicators:
      - "bonjour"
      - "salut"
      - "coucou"
      - "quoi"
      - "tu"
      - "vous"
      - "je"
      - "moi"
      - "ouais"
      - "non"
      - "oui"
      - "bah"
      - "wesh"
      - "mdrr"
      - "ptdr"

notifications:
  error_webhook: "" 
  ratelimit_notifications: true
